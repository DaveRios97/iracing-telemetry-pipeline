[kafka]
# IP and port of the Kafka broker on the backend machine
bootstrap_server = localhost:9092

# Kafka topic name
topic = iracing-live-telemetry

[collector]
# Run mode: if true, prints to console without connecting to Kafka
dry_run = true

# Target sampling frequency in Hertz
# The simulator emits at 60Hz; the collector downsamples to this frequency
sample_rate_hz = 10

# Micro-batching buffer size
# At 10Hz, a buffer_size of 10 equals one flush per second
buffer_size = 10
